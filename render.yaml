# Render Blueprint for Headsign - use this to jumpstart an instance on Render
services:
  - type: web
    name: Headsign
    runtime: image
    image:
      url: ghcr.io/jasonad123/headsign:latest
    envVars:
      - key: TRANSIT_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ENABLE_SERVER_CACHE
        sync: false
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: UNATTENDED_SETUP
        sync: false
      - key: UNATTENDED_TITLE
        sync: false
      - key: UNATTENDED_LOCATION
        sync: false
    healthCheckPath: /health
